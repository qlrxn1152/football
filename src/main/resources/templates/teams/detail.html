<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>팀 상세</title>
</head>
<body>

<h1>팀 상세</h1>

<hr>

<h2 th:text="${team.teamName}">팀 이름</h2>

<div>
    <p>
        <strong>팀 레이팅:</strong>
        <span th:text="${team.rating}">1000</span>
    </p>

    <p>
        <strong>팀장:</strong>
        <span th:text="${team.leaderMemberUsername}">leader</span>
    </p>
</div>

<hr>

<h3>팀원 목록</h3>

<table border="1">
    <thead>
    <tr>
        <th>회원 이름</th>
        <th>레이팅</th>
    </tr>
    </thead>

    <tbody>
    <tr th:if="${#lists.isEmpty(members)}">
        <td colspan="3">아직 팀원이 없습니다.</td>
    </tr>

    <tr th:each="member : ${members}">
        <td th:text="${member.username}">userA</td>
        <td th:text="${member.memberRating}">1000</td>
    </tr>
    </tbody>
</table>

<hr>

<h3>가입신청 팀원 목록</h3>

<p th:if="${successMessage}" th:text="${successMessage}" style="color: green;">
    성공 메시지
</p>

<table border="1">
    <thead>
    <tr>
        <th>회원 이름</th>
        <th>레이팅</th>
        <th>신청날짜</th>
    </tr>
    </thead>

    <tbody>
    <tr th:if="${#lists.isEmpty(requests)}">
        <td colspan="3">아직 가입신청한 팀원이 없습니다.</td>
    </tr>

    <tr th:each="request : ${requests}">
        <td th:text="${request.requestMemberUsername}">userA</td>
        <td th:text="${request.requestMemberRating}">1000</td>
        <td th:text="${#temporals.format(request.requestAt, 'yyyy-MM-dd HH:mm')}">
            2026-01-01 12:00
        </td>
        <td>
            <form th:action="@{/teams/{teamId}/join-requests/{requestMemberId}/accept(
                    teamId=${team.teamId},
                    requestMemberId=${request.requestMemberId}
                )}"
                  method="post"
                  style="display:inline;">
                <button type="submit">수락</button>
            </form>

            <form th:action="@{/teams/{teamId}/join-requests/{requestMemberId}/reject(
                    teamId=${team.teamId},
                    requestMemberId=${request.requestMemberId}
                )}"
                  method="post"
                  style="display:inline;">
                <button type="submit">거절</button>
            </form>
        </td>
    </tr>


    </tbody>
</table>

<form th:action="@{/teams/{teamId}/join-requests(teamId=${team.teamId})}"
      method="post">
    <button type="submit">가입 신청</button>
</form>

<hr>

<div>
    <a th:href="@{/teams}">팀 목록으로</a>
    |
    <a th:href="@{/}">홈으로</a>
    |
    <a th:href="@{/teams/{teamId}/edit(teamId=${team.teamId})}">
        팀 이름 수정
    </a>


</div>

</body>
</html>
