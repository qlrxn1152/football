<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>팀 목록</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <div class="page-header">
        <div>
            <h1 class="page-title">팀 목록</h1>
            <p class="page-description">등록된 팀을 확인하고 상세 페이지로 이동할 수 있습니다.</p>
        </div>

        <div class="page-actions">
            <a class="btn btn-primary" th:href="@{/teams/new}">팀 생성</a>
            <a class="btn btn-secondary" th:href="@{/}">홈으로</a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">
        성공 메시지
    </div>

    <div class="empty-box" th:if="${#lists.isEmpty(teams)}">
        등록된 팀이 없습니다.
    </div>

    <div class="card" th:if="${!#lists.isEmpty(teams)}">
        <table class="table">
            <thead>
            <tr>
                <th>팀 이름</th>
                <th>레이팅</th>
                <th>팀장</th>
                <th>상세</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="team : ${teams}">
                <td th:text="${team.teamName}">teamA</td>
                <td th:text="${team.rating}">1000</td>
                <td th:text="${team.leaderMemberUsername}">userA</td>
                <td>
                    <a class="btn btn-secondary"
                       th:href="@{/teams/{teamId}(teamId=${team.teamId})}">
                        상세 보기
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
