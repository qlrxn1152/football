<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<form th:action="@{/members/new}" th:object="${memberSaveDto}" method="post">
    <input type="text" th:field="*{username}" placeholder="아이디를 입력하세요.">
    <input type="password" th:field="*{password}" th:name="password" placeholder="비밀번호를 입력하세요.">
    <button type="submit">회원가입</button>
</form>

</body>
</html>
