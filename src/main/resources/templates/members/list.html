<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 목록</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <div class="page-header">
        <div>
            <h1 class="page-title">회원 목록</h1>
            <p class="page-description">등록된 회원과 레이팅을 확인할 수 있습니다.</p>
        </div>

        <div class="page-actions">
            <a class="btn btn-primary" th:href="@{/members/new}">회원가입</a>
            <a class="btn btn-secondary" th:href="@{/}">홈으로</a>
        </div>
    </div>

    <div class="card">
        <table class="table">
            <thead>
            <tr>
                <th>Username</th>
                <th>Rating</th>
                <th>상세</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="member : ${members}">
                <td th:text="${member.username}">userA</td>
                <td th:text="${member.rating}">1000</td>
                <td>
                    <a class="btn btn-secondary"
                       th:href="@{/members/{memberId}(memberId=${member.memberId})}">
                        상세
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
