<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="narrow-container">
    <div class="page-header">
        <div>
            <h1 class="page-title">로그인</h1>
            <p class="page-description">아이디와 비밀번호를 입력하세요.</p>
        </div>
    </div>

    <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}">
        로그인 실패 메시지
    </div>

    <div class="card">
        <form class="form" th:action="@{/login}" th:object="${memberLoginDto}" method="post">
            <input type="hidden" name="redirectURI" th:value="${redirectURI}">

            <div class="form-group">
                <label for="username">아이디</label>
                <input class="form-control" type="text" id="username" th:field="*{username}">
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input class="form-control" type="password" id="password" th:field="*{password}">
            </div>

            <div class="action-row">
                <button type="submit" class="btn btn-primary">로그인</button>
                <a class="btn btn-secondary" th:href="@{/members/new}">회원가입</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
