<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Football - 로그인 홈</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="home-hero">
        <h1>Football</h1>
        <p>
            <strong th:text="${member.username}">userA</strong>
            님 방문해주셔서 감사합니다.
        </p>

        <div class="grid" style="margin-top: 24px;">
            <div th:if="${member.teamName != null}"  class="stat-card">
                <p class="stat-label">나의 현재 레이팅 : <strong class="stat-value" th:text="${member.rating}">레이팅</strong></p>
                <p class="stat-label">나의 팀 : <a th:href="@{/teams/{teamId}(teamId=${member.teamId})}" class="stat-value" th:text="${member.teamName}">팀이름</a></p>
            </div>

            <div th:if="${member.teamName == null}"  class="stat-card">
                <p class="stat-label">나의 현재 레이팅 : <strong class="stat-value" th:text="${member.rating}">레이팅</strong></p>
                <p class="stat-label">팀에 가입해서 다양한 기능을 경험해보세요.</p>
            </div>
        </div>

        <div class="action-row" style="margin-top: 24px;">
            <a class="btn btn-primary" th:href="@{/teams}">팀 목록</a>
            <a class="btn btn-secondary" th:href="@{/teams/new}">팀 생성</a>
            <a class="btn btn-secondary" th:href="@{/matches}">매치 조회</a>
            <a class="btn btn-secondary" th:href="@{/members}">회원 목록</a>
        </div>
    </section>
</main>
</body>
</html>
